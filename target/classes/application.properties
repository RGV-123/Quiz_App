# ===================================
# SERVER CONFIGURATION
# ===================================
server.port=${PORT:8080}

# ===================================
# DATABASE CONFIGURATION (Aiven MySQL with SSL)
# ===================================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/quiz_app}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA / HIBERNATE CONFIGURATION
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Remove deprecated dialect - Hibernate auto-detects it now!
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect  ← REMOVED

# ===================================
# CONNECTION POOL
# ===================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===================================
# PRODUCTION SETTINGS
# ===================================
spring.jpa.open-in-view=false
logging.level.org.hibernate=WARN